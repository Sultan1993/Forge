<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="420">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8500A"/>
      <stop offset="100%" stop-color="#FF6B2B"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D9E75"/>
      <stop offset="100%" stop-color="#25C495"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="16" fill="url(#bg)"/>
  <rect width="900" height="420" rx="16" stroke="#222" stroke-width="1" fill="none"/>

  <!-- Left section: Your Devices -->
  <text x="130" y="42" fill="#777" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="0.1em">YOUR DEVICES</text>

  <!-- Laptop -->
  <g filter="url(#shadow)">
    <rect x="40" y="65" width="180" height="64" rx="10" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  </g>
  <g transform="translate(130, 97)">
    <svg x="-50" y="-9" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round">
      <rect x="3" y="4" width="18" height="12" rx="2"/><path d="M7 20h10M12 16v4"/>
    </svg>
    <text x="-24" y="5" fill="#eee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500">Laptop</text>
  </g>

  <!-- Tablet -->
  <g filter="url(#shadow)">
    <rect x="40" y="145" width="180" height="64" rx="10" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  </g>
  <g transform="translate(130, 177)">
    <svg x="-50" y="-9" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round">
      <rect x="4" y="2" width="16" height="20" rx="2"/><path d="M12 18h.01"/>
    </svg>
    <text x="-24" y="5" fill="#eee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500">Tablet</text>
  </g>

  <!-- Phone -->
  <g filter="url(#shadow)">
    <rect x="40" y="225" width="180" height="64" rx="10" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  </g>
  <g transform="translate(130, 257)">
    <svg x="-50" y="-9" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round">
      <rect x="6" y="2" width="12" height="20" rx="2"/><path d="M12 18h.01"/>
    </svg>
    <text x="-24" y="5" fill="#eee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500">Phone</text>
  </g>

  <!-- Any Browser -->
  <g filter="url(#shadow)">
    <rect x="40" y="305" width="180" height="64" rx="10" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  </g>
  <g transform="translate(130, 337)">
    <svg x="-50" y="-9" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    <text x="-24" y="5" fill="#eee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500">Any Browser</text>
  </g>

  <!-- Middle: Tailscale tunnel -->
  <text x="400" y="42" fill="#777" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="0.1em">TAILSCALE</text>

  <!-- Connection lines with glow -->
  <g opacity="0.6">
    <!-- Laptop line -->
    <line x1="220" y1="97" x2="350" y2="200" stroke="url(#teal)" stroke-width="1.5" stroke-dasharray="6 4"/>
    <!-- iPad line -->
    <line x1="220" y1="177" x2="350" y2="200" stroke="url(#teal)" stroke-width="1.5" stroke-dasharray="6 4"/>
    <!-- Phone line -->
    <line x1="220" y1="257" x2="350" y2="200" stroke="url(#teal)" stroke-width="1.5" stroke-dasharray="6 4"/>
    <!-- Browser line -->
    <line x1="220" y1="337" x2="350" y2="200" stroke="url(#teal)" stroke-width="1.5" stroke-dasharray="6 4"/>

    <!-- Lines to host -->
    <line x1="450" y1="200" x2="580" y2="130" stroke="url(#teal)" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="450" y1="200" x2="580" y2="200" stroke="url(#teal)" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="450" y1="200" x2="580" y2="270" stroke="url(#teal)" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="450" y1="200" x2="580" y2="340" stroke="url(#teal)" stroke-width="1.5" stroke-dasharray="6 4"/>
  </g>

  <!-- Tailscale hub circle -->
  <circle cx="400" cy="200" r="50" fill="#161618" stroke="#1D9E75" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="196" fill="#1D9E75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">Encrypted</text>
  <text x="400" y="210" fill="#1D9E75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">P2P</text>

  <!-- Right section: Host -->
  <text x="720" y="42" fill="#777" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="0.1em">YOUR HOST</text>

  <!-- Host machine box -->
  <g filter="url(#shadow)">
    <rect x="580" y="60" width="280" height="330" rx="12" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  </g>

  <!-- Forge logo + name (centered in header area y=60 to y=125, center=92) -->
  <g transform="translate(720, 92)">
    <rect x="-116" y="-14" width="28" height="28" rx="6" fill="url(#accent)"/>
    <text x="-102" y="4" fill="white" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">F</text>
    <text x="-76" y="-2" fill="#eee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Forge Host</text>
    <text x="-76" y="14" fill="#555" font-family="'SF Mono', 'Courier New', monospace" font-size="10">Mac Mini / Linux Server</text>
  </g>

  <!-- Divider -->
  <line x1="604" y1="125" x2="836" y2="125" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Web Dashboard (card y=138, h=48, center=162) -->
  <g>
    <rect x="604" y="138" width="232" height="48" rx="8" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
    <g transform="translate(622, 162)">
      <circle cx="0" cy="0" r="5" fill="#1D9E75"/>
      <text x="14" y="-5" fill="#eee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500">Web Dashboard</text>
      <text x="14" y="9" fill="#555" font-family="'SF Mono', 'Courier New', monospace" font-size="10">CPU, Memory, Disk, Controls</text>
    </g>
  </g>

  <!-- SSH (card y=196, h=48, center=220) -->
  <g>
    <rect x="604" y="196" width="232" height="48" rx="8" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
    <g transform="translate(622, 220)">
      <circle cx="0" cy="0" r="5" fill="#1D9E75"/>
      <text x="14" y="-5" fill="#eee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500">SSH Access</text>
      <text x="14" y="9" fill="#555" font-family="'SF Mono', 'Courier New', monospace" font-size="10">Claude Code, Codex, Aider, etc.</text>
    </g>
  </g>

  <!-- VNC (card y=254, h=48, center=278) -->
  <g>
    <rect x="604" y="254" width="232" height="48" rx="8" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
    <g transform="translate(622, 278)">
      <circle cx="0" cy="0" r="5" fill="#1D9E75"/>
      <text x="14" y="-5" fill="#eee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500">Screen Sharing (VNC)</text>
      <text x="14" y="9" fill="#555" font-family="'SF Mono', 'Courier New', monospace" font-size="10">Full desktop access</text>
    </g>
  </g>

  <!-- Always On (card y=312, h=48, center=336) -->
  <g>
    <rect x="604" y="312" width="232" height="48" rx="8" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
    <g transform="translate(622, 336)">
      <circle cx="0" cy="0" r="5" fill="#1D9E75"/>
      <text x="14" y="-5" fill="#eee" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500">Always On</text>
      <text x="14" y="9" fill="#555" font-family="'SF Mono', 'Courier New', monospace" font-size="10">Sleep disabled, auto-restart</text>
    </g>
  </g>

  <!-- Bottom labels -->
  <text x="130" y="395" fill="#444" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">Thin clients</text>
  <text x="400" y="395" fill="#444" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">No port forwarding. No cloud relay.</text>
  <text x="400" y="410" fill="#444" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">Direct device-to-device.</text>
  <text x="720" y="395" fill="#444" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">Your dev environment</text>
</svg>
